<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>多维卡尔曼滤波可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.0.5/lib/p5.js"></script>
    <link rel="stylesheet" type="text/css" href="kalman.css">
</head>

<body>
    <div class="controls">
        <p>噪声水平: <span id="noiseValue">10</span></p>
        <input type="range" id="noiseSlider" min="0" max="50" value="10">
        <p>过程噪声: <span id="processNoiseValue">0.01</span></p>
        <input type="range" id="processNoiseSlider" min="0.001" max="0.1" step="0.001" value="0.01">
    </div>
    <script src="kalman.js"></script>
</body>

</html>
